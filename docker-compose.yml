version: '3.8'

services:
  app:
    build: .
    container_name: yanfu-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=kuailv
      - DB_PASSWORD=Yanfu@2026!Secure
      - DB_NAME=kuailv
      - JWT_SECRET=kuailv_super_secret_jwt_key_2026_production_32chars!!
      - JWT_EXPIRES_IN=259200
      - AMAP_REST_KEY=${AMAP_REST_KEY:-}
      - AMAP_PRIVATE_KEY=${AMAP_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: mysql:5.7
    container_name: yanfu-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=kuailv
      - MYSQL_USER=kuailv
      - MYSQL_PASSWORD=Yanfu@2026!Secure
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:

---

